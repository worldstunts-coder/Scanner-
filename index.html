<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Receipt Scanner</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0d0d12;--s1:#161620;--s2:#1e1e2e;--bd:#2d2d45;--ac:#00e096;--ac2:#005c3d;--red:#ff4466;--tx:#eeeef5;--mu:#7070a0;--yl:#ffd60a;}
html,body{height:100%;background:#000;}
body{color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* VIEWS */
.view{display:none;flex-direction:column;height:100dvh;}
.view.active{display:flex;}

/* ── SCAN VIEW ── */
.cam-wrap{position:relative;width:100%;flex:0 0 50dvh;background:#000;overflow:hidden;}
#vid{width:100%;height:100%;object-fit:cover;display:none;}
#cnv{display:none;}
.cph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:rgba(255,255,255,.3);font-size:13px;letter-spacing:1px;text-align:center;padding:20px;}
.cph .ci{font-size:44px;opacity:.4;}
.sov{position:absolute;inset:0;display:none;}
.sov.on{display:block;}
.sline{position:absolute;left:4%;right:4%;height:2.5px;background:var(--ac);box-shadow:0 0 14px var(--ac);animation:scan 1.8s ease-in-out infinite;}
@keyframes scan{0%{top:8%}50%{top:88%}100%{top:8%}}
.cors{position:absolute;inset:14px;pointer-events:none;}
.cors::before,.cors::after{content:'';position:absolute;width:28px;height:28px;border-color:rgba(255,255,255,.6);border-style:solid;}
.cors::before{top:0;left:0;border-width:3px 0 0 3px;}
.cors::after{bottom:0;right:0;border-width:0 3px 3px 0;}
.cbar{position:absolute;bottom:0;left:0;right:0;padding:10px 14px 52px;background:linear-gradient(transparent,rgba(0,0,0,.9));font-size:12px;font-weight:600;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ac);flex-shrink:0;}
.dot.live{animation:blink 1.4s ease-in-out infinite;}
.dot.proc{background:var(--yl);animation:spn .5s linear infinite;}
.dot.off{background:var(--yl);animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spn{to{transform:rotate(360deg)}}
.scan-fab{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:64px;height:64px;border-radius:50%;background:#fff;border:none;box-shadow:0 0 0 3px rgba(255,255,255,.25);cursor:pointer;-webkit-appearance:none;transition:transform .1s;}
.scan-fab:active{transform:translateX(-50%) scale(.88);}
.scan-fab.on{background:var(--ac);}
.scan-fab-ic{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px;}

/* FOLDER BADGE on camera */
.folder-badge{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;}
.folder-badge:active{opacity:.7;}

/* PANEL */
.panel{flex:1 1 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}

/* TOP STRIP */
.top-strip{display:flex;align-items:stretch;border-bottom:1px solid var(--bd);flex-shrink:0;}
.total-block{flex:1;padding:10px 14px;}
.total-lbl{font-size:9px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;}
.total-amt{font-size:30px;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums;line-height:1.1;}
.total-cnt{font-size:11px;color:var(--mu);}
.detected-block{padding:10px 14px;text-align:right;border-left:1px solid var(--bd);min-width:110px;}
.det-lbl{font-size:9px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;}
.det-val{font-size:20px;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums;}
.det-val.dim{color:var(--mu);font-size:13px;font-weight:400;}

/* INPUT */
.inp-strip{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.pfx{background:var(--s2);color:var(--mu);font-size:22px;font-weight:700;padding:9px 9px 9px 13px;border-radius:10px 0 0 10px;border:1.5px solid var(--bd);border-right:none;display:flex;align-items:center;}
#ainp{flex:1;background:var(--s1);border:1.5px solid var(--bd);border-left:none;border-radius:0 10px 10px 0;color:var(--tx);font-size:26px;font-weight:800;padding:9px 10px;outline:none;-webkit-appearance:none;font-variant-numeric:tabular-nums;font-family:inherit;min-width:0;}
#ainp:focus{border-color:var(--ac);}
.badd{padding:0 18px;background:var(--ac);color:#000;border:none;border-radius:10px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;-webkit-appearance:none;flex-shrink:0;}
.badd:active{opacity:.8;}

/* HISTORY */
.hist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px;}
.hist-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.hist-lbl{font-size:9px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;}
.hist-btns{display:flex;gap:6px;}
.btn-sm{font-size:11px;font-weight:700;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:4px 10px;cursor:pointer;font-family:inherit;-webkit-appearance:none;color:var(--mu);}
.btn-sm.yl{color:var(--yl);border-color:rgba(255,214,10,.3);background:rgba(255,214,10,.08);}
.btn-sm:disabled{opacity:.3;pointer-events:none;}
.empty{color:var(--mu);font-size:13px;}
.hlist{display:flex;flex-direction:column;gap:5px;}
.hi{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:8px;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}}
.hi-n{font-size:10px;color:var(--mu);min-width:18px;}
.hi-b{flex:1;min-width:0;}
.hi-amt{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;cursor:pointer;}
.hi-amt:active{color:var(--ac);}
.hi-meta{font-size:10px;color:var(--mu);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-del{background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:3px 5px;border-radius:6px;-webkit-appearance:none;}
.hi-del:active{color:var(--red);}

/* BOTTOM NAV */
.bnav{display:flex;border-top:1px solid var(--bd);flex-shrink:0;background:var(--bg);}
.bnav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--mu);font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;-webkit-appearance:none;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.5px;text-transform:uppercase;}
.bnav-btn .ic{font-size:20px;}
.bnav-btn.active{color:var(--ac);}
.bnav-btn+.bnav-btn{border-left:1px solid var(--bd);}

/* ── FOLDERS VIEW ── */
.fview-header{display:flex;align-items:center;justify-content:space-between;padding:56px 16px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1);}
.fview-title{font-size:18px;font-weight:800;}
.btn-new-folder{background:var(--ac);color:#000;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:800;padding:8px 16px;cursor:pointer;-webkit-appearance:none;}
.btn-new-folder:active{opacity:.8;}
.flist{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.fcard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .15s;position:relative;}
.fcard.sel{border-color:var(--ac);}
.fcard:active{opacity:.8;}
.fcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.fcard-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.fcard-total{font-size:22px;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums;}
.fcard-meta{font-size:12px;color:var(--mu);}
.fcard-bar{margin-top:8px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden;}
.fcard-fill{height:100%;background:linear-gradient(90deg,var(--ac),#00a0ff);border-radius:2px;}
.fcard-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:4px 8px;-webkit-appearance:none;}
.fcard-del:active{color:var(--red);}
.no-folders{color:var(--mu);font-size:14px;text-align:center;padding:40px 20px;}

/* ── EXPORT VIEW ── */
.eview-header{display:flex;align-items:center;justify-content:space-between;padding:56px 16px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1);}
.eview-title{font-size:18px;font-weight:800;}
.export-content{flex:1;overflow-y:auto;padding:14px;}
.export-section{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
.export-sec-title{font-size:11px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.export-folder-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);}
.export-folder-row:last-child{border-bottom:none;}
.export-folder-name{font-size:14px;font-weight:600;}
.export-folder-amt{font-size:16px;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums;}
.export-grand{display:flex;align-items:center;justify-content:space-between;padding:12px 0 4px;}
.export-grand-lbl{font-size:14px;font-weight:800;color:var(--tx);}
.export-grand-amt{font-size:24px;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums;}
.btn-export{width:100%;padding:15px;background:var(--ac);color:#000;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;-webkit-appearance:none;margin-bottom:10px;}
.btn-export:active{opacity:.8;}
.btn-export-email{background:var(--s2);color:var(--tx);border:1px solid var(--bd);}
.export-text-preview{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px;font-family:monospace;font-size:11px;color:var(--mu);white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px;}
.modal-inp{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;color:var(--tx);font-size:16px;padding:13px 14px;outline:none;font-family:inherit;margin-bottom:10px;-webkit-appearance:none;}
.modal-inp:focus{border-color:var(--ac);}
.emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.emoji-opt{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--s2);border:2px solid transparent;border-radius:10px;cursor:pointer;}
.emoji-opt.sel{border-color:var(--ac);}
.modal-btns{display:flex;gap:8px;}
.modal-btns .btn{flex:1;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;-webkit-appearance:none;}
.btn-cancel-m{background:var(--s2);color:var(--tx);}
.btn-ok-m{background:var(--ac);color:#000;}

/* EDIT AMOUNT MODAL */
.edit-modal{background:var(--s1);border:1px solid var(--bd);border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;}

/* TOAST */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--s2);color:var(--tx);border:1px solid var(--ac);border-radius:16px;padding:9px 18px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ── SCAN VIEW ── -->
<div class="view active" id="viewScan">
  <div class="cam-wrap">
    <video id="vid" playsinline autoplay muted webkit-playsinline></video>
    <canvas id="cnv"></canvas>
    <div class="sov" id="sov"><div class="cors"></div><div class="sline"></div></div>
    <div class="cph" id="cph"><div class="ci">📷</div><span id="cphtxt">TAP BUTTON TO SCAN</span></div>
    <div class="cbar"><div class="dot off" id="dot"></div><span id="stxt">Ready</span></div>
    <button class="scan-fab" id="bscan" onclick="toggleScan()">
      <div class="scan-fab-ic" id="fabIc">📷</div>
    </button>
    <div class="folder-badge" onclick="showView('viewFolders')" id="activeFolderBadge">📁 All</div>
  </div>

  <div class="panel">
    <div class="top-strip">
      <div class="total-block">
        <div class="total-lbl">Running Total</div>
        <div class="total-amt" id="totAmt">$0.00</div>
        <div class="total-cnt" id="totSub">0 receipts</div>
      </div>
      <div class="detected-block">
        <div class="det-lbl">Detected</div>
        <div class="det-val dim" id="dval">—</div>
      </div>
    </div>

    <div class="inp-strip">
      <div class="pfx">$</div>
      <input id="ainp" type="number" inputmode="decimal" placeholder="0.00" step="0.01" min="0">
      <button class="badd" onclick="addEntry()">Add</button>
    </div>

    <div class="hist">
      <div class="hist-hd">
        <div class="hist-lbl" id="histTitle">Recent Scans</div>
        <div class="hist-btns">
          <button class="btn-sm yl" id="btnUndo" onclick="undoLast()" disabled>↩ Undo</button>
        </div>
      </div>
      <div id="histEl"><div class="empty">No entries yet. Start scanning!</div></div>
    </div>

    <div class="bnav">
      <button class="bnav-btn active" onclick="showView('viewScan')"><span class="ic">📷</span>Scan</button>
      <button class="bnav-btn" onclick="showView('viewFolders')"><span class="ic">📁</span>Folders</button>
      <button class="bnav-btn" onclick="showView('viewExport')"><span class="ic">📤</span>Export</button>
    </div>
  </div>
</div>

<!-- ── FOLDERS VIEW ── -->
<div class="view" id="viewFolders">
  <div class="fview-header">
    <div class="fview-title">📁 Folders</div>
    <button class="btn-new-folder" onclick="openNewFolder()">+ New</button>
  </div>
  <div class="flist" id="flist"></div>
  <div class="bnav">
    <button class="bnav-btn" onclick="showView('viewScan')"><span class="ic">📷</span>Scan</button>
    <button class="bnav-btn active" onclick="showView('viewFolders')"><span class="ic">📁</span>Folders</button>
    <button class="bnav-btn" onclick="showView('viewExport')"><span class="ic">📤</span>Export</button>
  </div>
</div>

<!-- ── EXPORT VIEW ── -->
<div class="view" id="viewExport">
  <div class="eview-header">
    <div class="eview-title">📤 Export</div>
  </div>
  <div class="export-content" id="exportContent"></div>
  <div class="bnav">
    <button class="bnav-btn" onclick="showView('viewScan')"><span class="ic">📷</span>Scan</button>
    <button class="bnav-btn" onclick="showView('viewFolders')"><span class="ic">📁</span>Folders</button>
    <button class="bnav-btn active" onclick="showView('viewExport')"><span class="ic">📤</span>Export</button>
  </div>
</div>

<!-- NEW FOLDER MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">New Folder</div>
    <input class="modal-inp" id="folderNameInp" type="text" placeholder="e.g. Home, Car, Medical…" maxlength="30">
    <div class="emoji-row" id="emojiRow"></div>
    <div class="modal-btns">
      <button class="btn btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn btn-ok-m" onclick="createFolder()">Create</button>
    </div>
  </div>
</div>

<!-- EDIT ENTRY MODAL -->
<div class="modal-bg" id="editModalBg">
  <div class="edit-modal">
    <div class="modal-title">Edit Amount</div>
    <input class="modal-inp" id="editAmtInp" type="number" inputmode="decimal" step="0.01" min="0">
    <div class="modal-btns">
      <button class="btn btn-cancel-m" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-ok-m" onclick="saveEditEntry()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
var API_KEY = 'ВСТАВЬ_КЛЮЧ_ЗДЕСЬ';
// ============================================================

var STORE = 'rxv2';
var EMOJIS = ['🏠','🚗','🏥','💊','🛒','🍔','⚡','🔧','🛍','📦','✈️','🎓','🐾','💼','🖥','🌿','🏋️','🐶','🎮','👗'];
var selEm = EMOJIS[0];
var editEntryId = null, editFolderId = null;

// STATE
var S = { folders: [], activeFolder: null };

function sv() { try { localStorage.setItem(STORE, JSON.stringify(S)); } catch(e) {} }
function ld() {
  try {
    var d = localStorage.getItem(STORE);
    if (d) { S = JSON.parse(d); if (!Array.isArray(S.folders)) S.folders = []; }
  } catch(e) {}
}

// CAMERA
var si = null, st = null, sc = false;
var lA = null, lT = 0, C = 1800; // cooldown ms

ld();
renderAll();
renderFolderBadge();

document.getElementById('ainp').addEventListener('keydown', function(e) { if(e.key==='Enter'){e.preventDefault();addEntry();} });
document.getElementById('folderNameInp').addEventListener('keydown', function(e) { if(e.key==='Enter'){e.preventDefault();createFolder();} });
document.getElementById('modalBg').addEventListener('click', function(e) { if(e.target===this)closeModal(); });
document.getElementById('editModalBg').addEventListener('click', function(e) { if(e.target===this)closeEditModal(); });

// VIEWS
function showView(id) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  if (id === 'viewExport') renderExport();
  if (id === 'viewFolders') renderFolders();
}

// FOLDER HELPERS
function getActiveEntries() {
  if (!S.activeFolder) {
    var all = [];
    S.folders.forEach(function(f){ f.entries.forEach(function(e){ all.push({entry:e,folder:f}); }); });
    all.sort(function(a,b){ return b.entry.ts - a.entry.ts; });
    return all;
  }
  var f = S.folders.find(function(x){ return x.id === S.activeFolder; });
  if (!f) return [];
  return f.entries.slice().reverse().map(function(e){ return {entry:e,folder:f}; });
}

function getActiveTotal() {
  if (!S.activeFolder) {
    return S.folders.reduce(function(s,f){ return s + f.entries.reduce(function(s2,e){ return s2+e.amount; },0); }, 0);
  }
  var f = S.folders.find(function(x){ return x.id === S.activeFolder; });
  return f ? f.entries.reduce(function(s,e){ return s+e.amount; },0) : 0;
}

function getActiveCount() {
  if (!S.activeFolder) return S.folders.reduce(function(s,f){ return s+f.entries.length; },0);
  var f = S.folders.find(function(x){ return x.id === S.activeFolder; });
  return f ? f.entries.length : 0;
}

// RENDER
function renderAll() {
  renderTotal();
  renderHistory();
  renderFolderBadge();
}

function renderTotal() {
  var t = getActiveTotal(), n = getActiveCount();
  document.getElementById('totAmt').textContent = '$' + t.toFixed(2);
  document.getElementById('totSub').textContent = n + ' receipt' + (n!==1?'s':'');
  document.getElementById('btnUndo').disabled = !n;
}

function renderFolderBadge() {
  var badge = document.getElementById('activeFolderBadge');
  if (!S.activeFolder) { badge.textContent = '📁 All Folders'; return; }
  var f = S.folders.find(function(x){ return x.id === S.activeFolder; });
  badge.textContent = f ? (f.em + ' ' + f.name) : '📁 All';
}

function renderHistory() {
  var el = document.getElementById('histEl');
  var name = document.getElementById('histTitle');
  var items = getActiveEntries();
  if (!S.activeFolder) name.textContent = 'All Entries';
  else {
    var f = S.folders.find(function(x){ return x.id===S.activeFolder; });
    name.textContent = f ? (f.em+' '+f.name) : 'Entries';
  }
  if (!items.length) { el.innerHTML = '<div class="empty">No entries yet. Start scanning!</div>'; return; }
  var h = '<div class="hlist">';
  items.forEach(function(item, i) {
    var e = item.entry, f = item.folder;
    var d = new Date(e.ts);
    var ds = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    var note = S.activeFolder ? '' : (' · ' + f.em + ' ' + f.name);
    h += '<div class="hi">'
      + '<div class="hi-n">' + (i+1) + '</div>'
      + '<div class="hi-b">'
        + '<div class="hi-amt" onclick="openEditEntry(\'' + f.id + '\',\'' + e.id + '\')">$' + e.amount.toFixed(2) + ' ✎</div>'
        + '<div class="hi-meta">' + ds + note + '</div>'
      + '</div>'
      + '<button class="hi-del" onclick="delEntry(\'' + f.id + '\',\'' + e.id + '\')">×</button>'
    + '</div>';
  });
  h += '</div>';
  el.innerHTML = h;
}

function renderFolders() {
  var el = document.getElementById('flist');
  if (!S.folders.length) {
    el.innerHTML = '<div class="no-folders">No folders yet.<br>Tap + New to create one.</div>';
    return;
  }
  var maxT = Math.max.apply(null, S.folders.map(function(f){ return f.entries.reduce(function(s,e){return s+e.amount;},0); }).concat([1]));
  var h = '';
  // "All" card
  var allTotal = getActiveTotal(), allCount = getActiveCount();
  h += '<div class="fcard' + (!S.activeFolder?' sel':'') + '" onclick="selectFolder(null)">'
    + '<div class="fcard-top"><div class="fcard-name">📋 All Folders</div><div class="fcard-total">$' + S.folders.reduce(function(s,f){return s+f.entries.reduce(function(s2,e){return s2+e.amount;},0);},0).toFixed(2) + '</div></div>'
    + '<div class="fcard-meta">' + S.folders.reduce(function(s,f){return s+f.entries.length;},0) + ' receipts</div>'
    + '</div>';
  S.folders.forEach(function(f) {
    var t = f.entries.reduce(function(s,e){return s+e.amount;},0);
    var pct = Math.round((t/maxT)*100);
    h += '<div class="fcard' + (S.activeFolder===f.id?' sel':'') + '" onclick="selectFolder(\'' + f.id + '\')">'
      + '<div class="fcard-top"><div class="fcard-name"><span>' + f.em + '</span>' + esc(f.name) + '</div><div class="fcard-total">$' + t.toFixed(2) + '</div></div>'
      + '<div class="fcard-meta">' + f.entries.length + ' receipt' + (f.entries.length!==1?'s':'') + '</div>'
      + '<div class="fcard-bar"><div class="fcard-fill" style="width:' + pct + '%"></div></div>'
      + '<button class="fcard-del" onclick="delFolder(event,\'' + f.id + '\')">✕</button>'
    + '</div>';
  });
  el.innerHTML = h;
}

function renderExport() {
  var el = document.getElementById('exportContent');
  var grandTotal = S.folders.reduce(function(s,f){return s+f.entries.reduce(function(s2,e){return s2+e.amount;},0);},0);
  var txt = '=== TAX RECEIPTS SUMMARY ===\n';
  txt += 'Date: ' + new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) + '\n\n';
  S.folders.forEach(function(f) {
    var t = f.entries.reduce(function(s,e){return s+e.amount;},0);
    txt += f.em + ' ' + f.name + ': $' + t.toFixed(2) + ' (' + f.entries.length + ' receipts)\n';
    f.entries.forEach(function(e,i) {
      var d = new Date(e.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      txt += '  ' + (i+1) + '. $' + e.amount.toFixed(2) + ' — ' + d + '\n';
    });
    txt += '\n';
  });
  txt += '----------------------------\n';
  txt += 'GRAND TOTAL: $' + grandTotal.toFixed(2) + '\n';
  txt += '============================';

  var h = '<div class="export-section">';
  h += '<div class="export-sec-title">Summary by Folder</div>';
  S.folders.forEach(function(f) {
    var t = f.entries.reduce(function(s,e){return s+e.amount;},0);
    h += '<div class="export-folder-row"><div class="export-folder-name">' + f.em + ' ' + esc(f.name) + '</div><div class="export-folder-amt">$' + t.toFixed(2) + '</div></div>';
  });
  h += '<div class="export-grand"><div class="export-grand-lbl">GRAND TOTAL</div><div class="export-grand-amt">$' + grandTotal.toFixed(2) + '</div></div>';
  h += '</div>';
  h += '<button class="btn-export" onclick="shareExport()">📤 Share / Send to Accountant</button>';
  h += '<button class="btn-export btn-export-email" onclick="emailExport()">✉️ Open in Mail</button>';
  h += '<div class="export-section"><div class="export-sec-title">Preview</div><div class="export-text-preview" id="exportPreview">' + esc(txt) + '</div></div>';
  el.innerHTML = h;
  el._txt = txt;
}

function shareExport() {
  var txt = document.getElementById('exportContent')._txt;
  if (navigator.share) {
    navigator.share({ title: 'Tax Receipts Summary', text: txt });
  } else {
    navigator.clipboard && navigator.clipboard.writeText(txt);
    toast('Copied to clipboard!');
  }
}

function emailExport() {
  var txt = document.getElementById('exportContent')._txt;
  window.location.href = 'mailto:?subject=Tax Receipts Summary&body=' + encodeURIComponent(txt);
}

// FOLDER ACTIONS
function selectFolder(id) {
  S.activeFolder = id;
  sv(); renderAll();
  showView('viewScan');
}

function delFolder(e, id) {
  e.stopPropagation();
  var f = S.folders.find(function(x){return x.id===id;});
  if (!confirm('Delete folder "' + (f?f.name:'') + '" and all its entries?')) return;
  S.folders = S.folders.filter(function(x){return x.id!==id;});
  if (S.activeFolder === id) S.activeFolder = null;
  sv(); renderFolders(); renderAll();
}

function openNewFolder() {
  selEm = EMOJIS[0];
  document.getElementById('folderNameInp').value = '';
  renderEmojiRow();
  document.getElementById('modalBg').classList.add('on');
  setTimeout(function(){ document.getElementById('folderNameInp').focus(); }, 200);
}

function closeModal() { document.getElementById('modalBg').classList.remove('on'); }

function renderEmojiRow() {
  document.getElementById('emojiRow').innerHTML = EMOJIS.map(function(e){
    return '<div class="emoji-opt' + (e===selEm?' sel':'') + '" onclick="pickEm(\'' + e + '\')">' + e + '</div>';
  }).join('');
}

function pickEm(e) { selEm = e; renderEmojiRow(); }

function createFolder() {
  var name = document.getElementById('folderNameInp').value.trim();
  if (!name) { document.getElementById('folderNameInp').focus(); return; }
  var f = { id: 'f'+Date.now(), name: name, em: selEm, entries: [] };
  S.folders.push(f);
  S.activeFolder = f.id;
  closeModal(); sv(); renderAll(); renderFolderBadge();
  toast('Folder created: ' + selEm + ' ' + name);
}

// ENTRY ACTIONS
function addEntry() {
  var v = parseFloat(document.getElementById('ainp').value);
  if (!v || v <= 0) { toast('Enter an amount'); document.getElementById('ainp').focus(); return; }
  var fid = S.activeFolder;
  if (!fid && S.folders.length > 0) fid = S.folders[0].id;
  if (!fid) { toast('Create a folder first!'); showView('viewFolders'); return; }
  var f = S.folders.find(function(x){return x.id===fid;});
  if (!f) return;
  f.entries.push({ id: 'e'+Date.now(), amount: v, ts: Date.now() });
  sv(); lA = v; lT = Date.now();
  document.getElementById('ainp').value = '';
  document.getElementById('dval').textContent = '—';
  document.getElementById('dval').className = 'det-val dim';
  renderAll();
  toast('+ $' + v.toFixed(2) + ' → ' + f.em + ' ' + f.name);
}

function undoLast() {
  var fid = S.activeFolder;
  if (fid) {
    var f = S.folders.find(function(x){return x.id===fid;});
    if (f && f.entries.length) {
      var r = f.entries.pop();
      sv(); lA=null; lT=0; renderAll();
      toast('Removed $' + r.amount.toFixed(2));
    }
  } else {
    // undo from all — remove last added globally
    var last = null, lastF = null;
    S.folders.forEach(function(f){
      if (f.entries.length) {
        var e = f.entries[f.entries.length-1];
        if (!last || e.ts > last.ts) { last=e; lastF=f; }
      }
    });
    if (last && lastF) {
      lastF.entries = lastF.entries.filter(function(e){return e.id!==last.id;});
      sv(); lA=null; lT=0; renderAll();
      toast('Removed $' + last.amount.toFixed(2));
    }
  }
}

function delEntry(fid, eid) {
  var f = S.folders.find(function(x){return x.id===fid;});
  if (!f) return;
  f.entries = f.entries.filter(function(e){return e.id!==eid;});
  sv(); renderAll();
}

function openEditEntry(fid, eid) {
  editFolderId = fid; editEntryId = eid;
  var f = S.folders.find(function(x){return x.id===fid;});
  if (!f) return;
  var e = f.entries.find(function(x){return x.id===eid;});
  if (!e) return;
  document.getElementById('editAmtInp').value = e.amount.toFixed(2);
  document.getElementById('editModalBg').classList.add('on');
  setTimeout(function(){ document.getElementById('editAmtInp').focus(); document.getElementById('editAmtInp').select(); }, 200);
}

function closeEditModal() { document.getElementById('editModalBg').classList.remove('on'); editEntryId=null; editFolderId=null; }

function saveEditEntry() {
  var v = parseFloat(document.getElementById('editAmtInp').value);
  if (!v || v <= 0) return;
  var f = S.folders.find(function(x){return x.id===editFolderId;});
  if (!f) return;
  var e = f.entries.find(function(x){return x.id===editEntryId;});
  if (!e) return;
  e.amount = v;
  sv(); renderAll(); closeEditModal();
  toast('Updated to $' + v.toFixed(2));
}

// CAMERA
function toggleScan() { if (sc) stopScan(); else startScan(); }

function startScan() {
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false})
  .then(function(s){
    st=s;
    var v=document.getElementById('vid');
    v.srcObject=s; v.style.display='block';
    document.getElementById('cph').style.display='none';
    document.getElementById('sov').classList.add('on');
    v.onloadedmetadata=function(){
      v.play().then(function(){
        sc=true; lA=null;
        setDot('live','Live — point at TOTAL');
        document.getElementById('bscan').classList.add('on');
        document.getElementById('fabIc').textContent='⏹';
        si=setInterval(ocr,2500);
      }).catch(noCam);
    };
  }).catch(noCam);
}

function stopScan() {
  clearInterval(si); si=null;
  if(st){st.getTracks().forEach(function(t){t.stop();});st=null;}
  var v=document.getElementById('vid');
  v.style.display='none'; v.srcObject=null;
  document.getElementById('cph').style.display='flex';
  document.getElementById('sov').classList.remove('on');
  sc=false;
  setDot('off','Stopped');
  document.getElementById('bscan').classList.remove('on');
  document.getElementById('fabIc').textContent='📷';
}

function noCam() {
  sc=false;
  setDot('off','No camera — enter manually');
  document.getElementById('cphtxt').textContent='ENTER AMOUNT MANUALLY';
  document.getElementById('fabIc').textContent='📷';
  document.getElementById('bscan').classList.remove('on');
}

function ocr() {
  var v=document.getElementById('vid');
  if(!v.readyState||v.readyState<2)return;
  var c=document.getElementById('cnv');
  c.width=v.videoWidth||1280; c.height=v.videoHeight||720;
  var ctx=c.getContext('2d'); ctx.drawImage(v,0,0,c.width,c.height);
  // Crop bottom 55%
  var cy=Math.floor(c.height*.40), ch=c.height-cy;
  var t=document.createElement('canvas'); t.width=c.width; t.height=ch;
  t.getContext('2d').putImageData(ctx.getImageData(0,cy,c.width,ch),0,0);
  var b64=t.toDataURL('image/jpeg',.88).split(',')[1];
  setDot('proc','Reading…');

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':API_KEY,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:100,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:'Receipt photo. Find the final total amount paid.\nPriority: TOTAL > GRAND TOTAL > CHECK TOTAL > AMOUNT DUE > BALANCE DUE.\nFallback: if no TOTAL visible, calculate subtotal + tax.\nReturn ONLY JSON: {"amount":47.83,"label":"TOTAL","method":"direct"}\nIf fallback used: {"amount":47.83,"label":"SUBTOTAL+TAX","method":"calculated"}\nIf nothing found: {"amount":null}\nAmount must be a plain number.'}
      ]}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    var txt=((d.content&&d.content[0]&&d.content[0].text)||'').trim().replace(/```json|```/g,'').trim();
    var p=null;
    try{p=JSON.parse(txt);}catch(e){var m=txt.match(/\{[\s\S]*?\}/);if(m)try{p=JSON.parse(m[0]);}catch(e2){}}
    var a=p&&p.amount>0?Number(p.amount):null;
    if(a){
      var lbl = p.label||'TOTAL';
      setDot('live','Found: '+lbl+' $'+a.toFixed(2));
      document.getElementById('dval').textContent='$'+a.toFixed(2);
      document.getElementById('dval').className='det-val';
      var now=Date.now();
      var coolOk=(now-lT)>C;
      var diffAmt=lA===null||Math.abs(a-lA)>0.005;
      if(coolOk&&diffAmt){
        document.getElementById('ainp').value=a.toFixed(2);
      } else if(!coolOk){
        setDot('live','Wait a moment…');
      } else {
        setDot('live','Same amount — skipped');
      }
    } else {
      setDot('live','Not found — enter manually');
      document.getElementById('dval').textContent='not found';
      document.getElementById('dval').className='det-val dim';
    }
  })
  .catch(function(){setDot('live','Error — check key');});
}

function setDot(m,t){
  document.getElementById('dot').className='dot '+(m==='live'?'live':m==='proc'?'proc':'off');
  document.getElementById('stxt').textContent=t;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var tt=null;
function toast(m){
  var el=document.getElementById('toast');
  el.textContent=m;el.classList.add('on');
  clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('on');},2400);
}
</script>
